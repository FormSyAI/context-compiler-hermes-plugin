name: formalcc-memory
version: 0.1.0
type: memory_provider
description: FormalCC Memory Provider for Hermes Agent

author: FormalAI
license: MIT

entry_point: plugins.memory.formalcc_memory:FormalCCMemoryProvider

requirements:
  - httpx>=0.27.0
  - pydantic>=2.0.0

config_schema:
  type: object
  properties:
    base_url:
      type: string
      default: "https://api.formsy.ai"
    api_key_env:
      type: string
      default: "FORMALCC_API_KEY"
    workspace_id:
      type: string
      default: "ws_default"
    tenant_id:
      type: string
    timeout_s:
      type: integer
      default: 30
    enable_memory_tools:
      type: boolean
      default: true
